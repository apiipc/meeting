    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gemini Phiên Âm</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Babel for JSX transformation in browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    <script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/client": "https://aistudiocdn.com/react-dom@^19.2.0/client",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.29.0",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>

    <script type="text/babel" data-presets="react,typescript" data-type="module">
      import React, { useState, useRef, useEffect } from 'react';
      import { createRoot } from 'react-dom/client';
      import { GoogleGenAI } from "@google/genai";

      // ==========================================
      // CẤU HÌNH API KEY
      // ==========================================
      // >>> HÃY DÁN API KEY CỦA BẠN VÀO DÒNG DƯỚI ĐÂY <<<
      const API_KEY_INPUT = "AIzaSyCdEEVv73SHLF67OyE2mJNFhH1A7qHRevE";
      
      // Logic để lấy API Key an toàn (ưu tiên process.env nếu có)
      const getApiKey = () => {
          try {
            if (typeof process !== 'undefined' && process.env && process.env.API_KEY) {
                return process.env.API_KEY;
            }
          } catch (e) {
            // process not defined in browser
          }
          return API_KEY_INPUT;
      };

      // ==========================================
      // UTILS (Xử lý âm thanh)
      // ==========================================

      function blobToBase64(blob) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onloadend = () => {
            if (typeof reader.result === 'string') {
              const base64 = reader.result.split(',')[1];
              resolve(base64);
            } else {
              reject(new Error('Failed to convert blob to base64'));
            }
          };
          reader.onerror = reject;
          reader.readAsDataURL(blob);
        });
      }

      const TARGET_SAMPLE_RATE = 16000;
      const TARGET_CHANNELS = 1; 

      async function getAudioBufferFromFile(file) {
        const arrayBuffer = await file.arrayBuffer();
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        return await audioCtx.decodeAudioData(arrayBuffer);
      }

      function audioDataToWavFile(channelData, sampleRate, fileName) {
        const buffer = new AudioBuffer({
          length: channelData.length,
          numberOfChannels: 1,
          sampleRate: sampleRate
        });
        buffer.copyToChannel(channelData, 0);
        const blob = audioBufferToWav(buffer);
        return new File([blob], fileName, { type: 'audio/wav' });
      }

      function audioBufferToWav(buffer) {
        const numOfChan = buffer.numberOfChannels;
        const length = buffer.length * numOfChan * 2 + 44;
        const bufferOut = new ArrayBuffer(length);
        const view = new DataView(bufferOut);
        const channels = [];
        let i;
        let sample;
        let offset = 0;
        let pos = 0;

        function setUint16(data) {
          view.setUint16(pos, data, true);
          pos += 2;
        }

        function setUint32(data) {
          view.setUint32(pos, data, true);
          pos += 4;
        }

        setUint32(0x46464952); // "RIFF"
        setUint32(length - 8); 
        setUint32(0x45564157); // "WAVE"
        setUint32(0x20746d66); // "fmt "
        setUint32(16); 
        setUint16(1); 
        setUint16(numOfChan);
        setUint32(buffer.sampleRate);
        setUint32(buffer.sampleRate * 2 * numOfChan); 
        setUint16(numOfChan * 2); 
        setUint16(16); 
        setUint32(0x61746164); // "data"
        setUint32(length - pos - 4); 

        for (i = 0; i < buffer.numberOfChannels; i++)
          channels.push(buffer.getChannelData(i));

        while (pos < buffer.length) {
          for (i = 0; i < numOfChan; i++) {
            sample = Math.max(-1, Math.min(1, channels[i][pos])); 
            sample = (0.5 + sample < 0 ? sample * 32768 : sample * 32767) | 0; 
            view.setInt16(44 + offset, sample, true);
            offset += 2;
          }
          pos++;
        }

        return new Blob([bufferOut], { type: 'audio/wav' });
      }

      async function compressAudio(file) {
        const audioBuffer = await getAudioBufferFromFile(file);
        const offlineCtx = new OfflineAudioContext(
          TARGET_CHANNELS,
          audioBuffer.duration * TARGET_SAMPLE_RATE, 
          TARGET_SAMPLE_RATE
        );
        const source = offlineCtx.createBufferSource();
        source.buffer = audioBuffer;
        source.connect(offlineCtx.destination);
        source.start();
        const renderedBuffer = await offlineCtx.startRendering();
        const wavBlob = audioBufferToWav(renderedBuffer);
        return new File([wavBlob], `compressed_${file.name.replace(/\.[^/.]+$/, "")}.wav`, { type: 'audio/wav' });
      }

      async function splitAudio(file) {
        const audioBuffer = await getAudioBufferFromFile(file);
        const CHUNK_DURATION_SEC = 300; 
        
        if (audioBuffer.duration <= CHUNK_DURATION_SEC) {
          return [await compressAudio(file)];
        }

        const totalDuration = audioBuffer.duration;
        const chunks = [];
        const baseName = file.name.replace(/\.[^/.]+$/, "");
        
        const offlineCtx = new OfflineAudioContext(
          TARGET_CHANNELS,
          totalDuration * TARGET_SAMPLE_RATE,
          TARGET_SAMPLE_RATE
        );
        
        const source = offlineCtx.createBufferSource();
        source.buffer = audioBuffer;
        source.connect(offlineCtx.destination);
        source.start();
        
        const resampledBuffer = await offlineCtx.startRendering();
        const pcmData = resampledBuffer.getChannelData(0); 
        
        const samplesPerChunk = CHUNK_DURATION_SEC * TARGET_SAMPLE_RATE;
        let startSample = 0;
        let partIndex = 1;

        while (startSample < pcmData.length) {
          const endSample = Math.min(startSample + samplesPerChunk, pcmData.length);
          const chunkData = pcmData.slice(startSample, endSample);
          
          const chunkFile = audioDataToWavFile(
            chunkData, 
            TARGET_SAMPLE_RATE, 
            `${baseName}_part${partIndex}.wav`
          );
          
          chunks.push(chunkFile);
          
          startSample = endSample;
          partIndex++;
        }

        return chunks;
      }

      // ==========================================
      // COMPONENT: AudioTranscriber
      // ==========================================
      
      const MAX_FILE_SIZE = 15 * 1024 * 1024; 

      const AudioTranscriber = () => {
        const [inputMode, setInputMode] = useState('mic');
        const [isRecording, setIsRecording] = useState(false);
        const [isProcessing, setIsProcessing] = useState(false);
        const [isSplitting, setIsSplitting] = useState(false); 
        const [processingStatus, setProcessingStatus] = useState('');
        const [transcription, setTranscription] = useState('');
        const [recordingTime, setRecordingTime] = useState(0);
        const [systemPrompt, setSystemPrompt] = useState("Tóm tắt các điểm chính từ bản phiên âm âm thanh này thành một danh sách ngắn gọn.");
        const [analysis, setAnalysis] = useState('');
        const [isAnalyzing, setIsAnalyzing] = useState(false);
        const [autoAnalyze, setAutoAnalyze] = useState(true);
        const [selectedFile, setSelectedFile] = useState(null);
        const [fileParts, setFileParts] = useState([]);
        
        const fileInputRef = useRef(null);
        const mediaRecorderRef = useRef(null);
        const audioChunksRef = useRef([]);
        const timerRef = useRef(undefined);

        const startRecording = async () => {
            try {
            setTranscription('');
            setAnalysis('');
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const mediaRecorder = new MediaRecorder(stream);
            
            mediaRecorderRef.current = mediaRecorder;
            audioChunksRef.current = [];

            mediaRecorder.ondataavailable = (event) => {
                if (event.data.size > 0) {
                audioChunksRef.current.push(event.data);
                }
            };

            mediaRecorder.onstop = async () => {
                const audioBlob = new Blob(audioChunksRef.current, { type: 'audio/webm' });
                stream.getTracks().forEach(track => track.stop());
                const file = new File([audioBlob], "recording.webm", { type: "audio/webm" });
                await handleTranscriptionFlow(file);
            };

            mediaRecorder.start();
            setIsRecording(true);
            setRecordingTime(0);
            timerRef.current = window.setInterval(() => {
                setRecordingTime(prev => prev + 1);
            }, 1000);

            } catch (error) {
            console.error("Lỗi khi bắt đầu ghi âm:", error);
            alert("Không thể truy cập microphone.");
            }
        };

        const stopRecording = () => {
            if (mediaRecorderRef.current && isRecording) {
            mediaRecorderRef.current.stop();
            setIsRecording(false);
            if (timerRef.current) clearInterval(timerRef.current);
            }
        };

        const handleFileSelection = async (file) => {
            setTranscription('');
            setAnalysis('');
            setSelectedFile(file);
            setFileParts([]); 

            if (file.size > MAX_FILE_SIZE) {
                try {
                    setIsSplitting(true);
                    setProcessingStatus("Đang chuẩn hóa và chia nhỏ tệp lớn...");
                    const chunks = await splitAudio(file);
                    setFileParts(chunks);
                    setProcessingStatus(`Đã chia thành ${chunks.length} phần. Sẵn sàng phiên âm.`);
                    setIsSplitting(false);
                } catch (error) {
                    console.error("Lỗi xử lý file:", error);
                    alert("Đã xảy ra lỗi khi cố gắng xử lý tệp âm thanh.");
                    setIsSplitting(false);
                    setProcessingStatus("");
                    setSelectedFile(null);
                }
            } else {
                setFileParts([file]);
                setProcessingStatus("");
            }
        };

        const handleFileChange = (e) => {
            if (e.target.files && e.target.files[0]) {
            handleFileSelection(e.target.files[0]);
            }
        };

        const handleDrop = (e) => {
            e.preventDefault();
            e.stopPropagation();
            if (e.dataTransfer.files && e.dataTransfer.files[0]) {
                handleFileSelection(e.dataTransfer.files[0]);
            }
        };

        const handleDragOver = (e) => {
            e.preventDefault();
            e.stopPropagation();
        };

        const processFile = async () => {
            if (selectedFile && fileParts.length > 0) {
                await handleTranscriptionFlow(null, fileParts);
            }
        };

        const runAnalysis = async (textToAnalyze) => {
            if (!textToAnalyze) return;
            setIsAnalyzing(true);
            try {
                const apiKey = getApiKey();
                if (!apiKey || apiKey === "YOUR_API_KEY_HERE") {
                    throw new Error("Vui lòng cấu hình API KEY trong mã nguồn.");
                }
                const ai = new GoogleGenAI({ apiKey });
                const response = await ai.models.generateContent({
                    model: 'gemini-2.5-flash',
                    config: { systemInstruction: systemPrompt },
                    contents: [{ text: textToAnalyze }]
                });
                setAnalysis(response.text || "Không có phân tích nào được tạo.");
            } catch (error) {
                console.error("Lỗi phân tích:", error);
                setAnalysis(`Lỗi trong quá trình phân tích: ${error.message}`);
            } finally {
                setIsAnalyzing(false);
            }
        };

        const handleTranscriptionFlow = async (singleFile, parts = []) => {
            setIsProcessing(true);
            setAnalysis('');
            
            let filesToProcess = parts;
            if (singleFile) {
                if (singleFile.size > MAX_FILE_SIZE) {
                    setProcessingStatus("Đang xử lý bản ghi âm lớn...");
                    try {
                        filesToProcess = await splitAudio(singleFile);
                    } catch (e) {
                        setTranscription("Lỗi khi xử lý bản ghi âm.");
                        setIsProcessing(false);
                        return;
                    }
                } else {
                    filesToProcess = [singleFile];
                }
            }

            let fullTranscript = "";
            const apiKey = getApiKey();
            
            if (!apiKey || apiKey === "YOUR_API_KEY_HERE") {
                setTranscription("Lỗi: Chưa cấu hình API Key. Vui lòng mở file và nhập API Key vào biến API_KEY_INPUT.");
                setIsProcessing(false);
                return;
            }

            const ai = new GoogleGenAI({ apiKey });

            try {
                for (let i = 0; i < filesToProcess.length; i++) {
                    const currentFile = filesToProcess[i];
                    const partNum = i + 1;
                    const total = filesToProcess.length;
                    
                    setProcessingStatus(total > 1 ? `Đang phiên âm phần ${partNum}/${total}...` : "Đang phiên âm...");

                    const partText = await transcribeSingleFile(ai, currentFile);
                    
                    if (partText) {
                        fullTranscript += (fullTranscript ? "\n\n" : "") + partText;
                        setTranscription(fullTranscript); 
                    }
                }

                if (!fullTranscript) {
                    setTranscription("Không tạo được bản phiên âm.");
                } else {
                    if (autoAnalyze) {
                        setProcessingStatus("Đang phân tích nội dung...");
                        await runAnalysis(fullTranscript);
                    }
                }

            } catch (error) {
                console.error("Lỗi quy trình phiên âm:", error);
                let errorMsg = error.message || JSON.stringify(error);
                if (errorMsg.includes("500") || errorMsg.includes("Rpc failed")) {
                     errorMsg = "Lỗi kết nối hoặc tệp quá lớn. Hệ thống đã cố gắng xử lý nhưng thất bại. Vui lòng kiểm tra lại mạng.";
                }
                setTranscription(prev => prev + `\n\n[Lỗi dừng đột ngột]: ${errorMsg}`);
            } finally {
                setIsProcessing(false);
                setProcessingStatus("");
            }
        };

        const transcribeSingleFile = async (ai, file) => {
            try {
                const base64Data = await blobToBase64(file);
                let mimeType = file.type;
                if (!mimeType || mimeType === '') mimeType = 'audio/wav'; 

                const response = await ai.models.generateContent({
                    model: 'gemini-2.5-flash',
                    contents: {
                    parts: [
                        { inlineData: { mimeType: mimeType, data: base64Data } },
                        { text: "Phiên âm âm thanh này một cách chính xác. Chỉ trả về văn bản đã phiên âm, không thêm lời dẫn." }
                    ]
                    }
                });
                return response.text || "";
            } catch (error) {
                console.error(`Lỗi part ${file.name}:`, error);
                throw error; 
            }
        };

        const formatTime = (seconds) => {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        };

        return (
            <div className="flex flex-col h-full w-full max-w-6xl mx-auto p-4 animate-fade-in">
                <div className="mb-4 text-center">
                    <h2 className="text-2xl font-bold text-white mb-1">Phiên âm & Phân tích Âm thanh</h2>
                    <p className="text-slate-400 text-sm">Hỗ trợ file lớn (tự động chia nhỏ và xử lý tuần tự).</p>
                </div>

                <div className="flex flex-col md:flex-row gap-6 h-full min-h-0">
                    <div className="flex flex-col md:w-1/3 gap-4">
                        <div className="bg-slate-800/50 rounded-2xl border border-slate-700 overflow-hidden flex-shrink-0">
                            <div className="flex border-b border-slate-700">
                                <button 
                                    onClick={() => setInputMode('mic')}
                                    className={`flex-1 py-3 text-sm font-medium transition-colors ${inputMode === 'mic' ? 'bg-slate-700/50 text-white border-b-2 border-blue-500' : 'text-slate-400 hover:text-slate-200 hover:bg-slate-800'}`}
                                >
                                    Ghi âm
                                </button>
                                <button 
                                    onClick={() => setInputMode('file')}
                                    className={`flex-1 py-3 text-sm font-medium transition-colors ${inputMode === 'file' ? 'bg-slate-700/50 text-white border-b-2 border-blue-500' : 'text-slate-400 hover:text-slate-200 hover:bg-slate-800'}`}
                                >
                                    Tải tệp lên
                                </button>
                            </div>

                            <div className="flex flex-col items-center justify-center p-6 min-h-[250px]">
                                {inputMode === 'mic' ? (
                                    <>
                                        <div className={`relative w-28 h-28 flex items-center justify-center rounded-full transition-all duration-500 ${isRecording ? 'bg-red-500/20 shadow-[0_0_30px_rgba(239,68,68,0.3)]' : 'bg-slate-700'}`}>
                                            <button
                                                onClick={isRecording ? stopRecording : startRecording}
                                                disabled={isProcessing}
                                                className={`w-20 h-20 rounded-full flex items-center justify-center transition-all duration-300 z-10 ${
                                                    isProcessing ? 'bg-slate-600 cursor-not-allowed' :
                                                    isRecording ? 'bg-red-500 hover:bg-red-600 scale-110' : 'bg-blue-500 hover:bg-blue-600 hover:scale-105'
                                                }`}
                                            >
                                                {isProcessing ? (
                                                    <svg className="animate-spin h-8 w-8 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                                        <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                                                        <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                                    </svg>
                                                ) : isRecording ? (
                                                    <div className="w-8 h-8 bg-white rounded-sm" />
                                                ) : (
                                                    <svg xmlns="http://www.w3.org/2000/svg" className="h-10 w-10 text-white ml-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
                                                    </svg>
                                                )}
                                            </button>
                                            {isRecording && (
                                                <div className="absolute inset-0 rounded-full border-2 border-red-500 animate-ping opacity-20"></div>
                                            )}
                                        </div>
                                        
                                        <div className="mt-6 text-center">
                                            <div className="text-2xl font-mono font-bold text-white mb-1">{formatTime(recordingTime)}</div>
                                            <p className="text-sm text-slate-400">
                                                {processingStatus || (isProcessing ? 'Đang xử lý...' : isRecording ? 'Đang ghi âm...' : 'Nhấn để ghi âm')}
                                            </p>
                                        </div>
                                    </>
                                ) : (
                                    <div 
                                        className="w-full h-full flex flex-col items-center justify-center"
                                        onDrop={handleDrop}
                                        onDragOver={handleDragOver}
                                    >
                                        <input 
                                            type="file" 
                                            ref={fileInputRef} 
                                            onChange={handleFileChange} 
                                            accept="audio/*,video/mp4,video/mpeg,video/webm" 
                                            className="hidden" 
                                        />
                                        
                                        {isSplitting ? (
                                            <div className="flex flex-col items-center justify-center text-slate-300">
                                                <svg className="animate-spin h-10 w-10 text-blue-500 mb-3" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                                    <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                                                    <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                                </svg>
                                                <p className="font-medium text-center">{processingStatus}</p>
                                                <p className="text-xs text-slate-500 mt-1">Quá trình này có thể mất vài phút với tệp lớn</p>
                                            </div>
                                        ) : !selectedFile ? (
                                            <div 
                                                onClick={() => fileInputRef.current?.click()}
                                                className="w-full h-56 border-2 border-dashed border-slate-600 rounded-xl flex flex-col items-center justify-center cursor-pointer hover:border-blue-500 hover:bg-slate-800/50 transition-all group"
                                            >
                                                <div className="p-3 bg-slate-700 rounded-full mb-3 group-hover:scale-110 transition-transform">
                                                    <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                                                    </svg>
                                                </div>
                                                <p className="text-slate-300 text-sm font-medium">Nhấp hoặc kéo thả</p>
                                                <p className="text-[10px] text-slate-500 mt-1 text-center px-4">Hỗ trợ mọi file âm thanh/video<br/>Tự động chia nhỏ file lớn</p>
                                            </div>
                                        ) : (
                                            <div className="w-full flex flex-col items-center">
                                                <div className="w-full bg-slate-700/50 p-3 rounded-xl border border-slate-600 mb-4 flex items-center gap-3">
                                                    <div className="p-2 bg-blue-500/20 rounded-lg">
                                                        <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 3-2 3-2zm0 0v-8" />
                                                        </svg>
                                                    </div>
                                                    <div className="flex-1 min-w-0">
                                                        <p className="text-sm font-medium text-slate-200 truncate">{selectedFile.name}</p>
                                                        <p className="text-xs text-slate-500">
                                                            {(selectedFile.size / 1024 / 1024).toFixed(2)} MB 
                                                            {fileParts.length > 1 && ` • Chia thành ${fileParts.length} phần`}
                                                        </p>
                                                    </div>
                                                    <button onClick={() => { setSelectedFile(null); setFileParts([]); setTranscription(''); setAnalysis(''); }} className="text-slate-500 hover:text-red-400">
                                                        <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                                            <path fillRule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clipRule="evenodd" />
                                                        </svg>
                                                    </button>
                                                </div>
                                                
                                                <button
                                                    onClick={processFile}
                                                    disabled={isProcessing}
                                                    className="w-full py-3 bg-blue-600 hover:bg-blue-500 text-white rounded-xl font-semibold shadow-lg shadow-blue-600/20 transition-all flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed"
                                                >
                                                    {isProcessing ? (
                                                         <>
                                                            <svg className="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                                                <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                                                                <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                                            </svg>
                                                            <span>{processingStatus || "Đang xử lý..."}</span>
                                                         </>
                                                    ) : (
                                                        <>
                                                            <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" />
                                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                                                            </svg>
                                                            <span>Bắt đầu phiên âm</span>
                                                        </>
                                                    )}
                                                </button>
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* Analysis Settings */}
                        <div className="bg-slate-800/50 rounded-2xl border border-slate-700 p-4 flex-1 flex flex-col">
                            <div className="flex items-center justify-between mb-3">
                                <h3 className="text-sm font-bold text-slate-200 flex items-center gap-2">
                                    <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4 text-purple-400" viewBox="0 0 20 20" fill="currentColor">
                                        <path fillRule="evenodd" d="M11.3 1.046A1 1 0 0112 2v5h4a1 1 0 01.82 1.573l-7 10A1 1 0 018 18v-5H4a1 1 0 01-.82-1.573l7-10a1 1 0 011.12-.38z" clipRule="evenodd" />
                                    </svg>
                                    Lời nhắc Hệ thống Phân tích
                                </h3>
                                <div className="flex items-center gap-2">
                                    <label className="text-[10px] text-slate-400 font-medium uppercase tracking-wider">Tự động chạy</label>
                                    <button 
                                        onClick={() => setAutoAnalyze(!autoAnalyze)}
                                        className={`w-9 h-5 rounded-full transition-colors relative ${autoAnalyze ? 'bg-green-500' : 'bg-slate-600'}`}
                                    >
                                        <div className={`absolute top-1 w-3 h-3 rounded-full bg-white transition-transform ${autoAnalyze ? 'left-5' : 'left-1'}`} />
                                    </button>
                                </div>
                            </div>
                            <textarea
                                value={systemPrompt}
                                onChange={(e) => setSystemPrompt(e.target.value)}
                                className="w-full flex-1 bg-slate-900/50 text-slate-300 text-sm p-3 rounded-xl border border-slate-600 focus:border-purple-500 focus:ring-1 focus:ring-purple-500 outline-none resize-none"
                                placeholder="Nhập hướng dẫn để phân tích bản phiên âm (ví dụ: Tóm tắt, Trích xuất ngày tháng, Dịch)"
                            />
                            {!autoAnalyze && transcription && !isAnalyzing && !isProcessing && (
                                <button 
                                    onClick={() => runAnalysis(transcription)}
                                    className="mt-3 w-full py-2 bg-purple-600/20 border border-purple-500/30 hover:bg-purple-600/30 text-purple-300 rounded-lg text-sm font-medium transition-all"
                                >
                                    Chạy Phân tích
                                </button>
                            )}
                        </div>
                    </div>

                    {/* Right Column */}
                    <div className="flex-1 flex flex-col gap-4 min-h-0 overflow-hidden">
                        {/* Transcription Result */}
                        <div className={`bg-slate-800/50 rounded-2xl border border-slate-700 p-5 flex flex-col transition-all duration-500 ${analysis ? 'h-1/2' : 'h-full'}`}>
                            <div className="flex items-center justify-between mb-3 flex-shrink-0">
                                <h3 className="text-xs font-bold text-slate-400 uppercase tracking-wider flex items-center gap-2">
                                    <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                                    </svg>
                                    Bản phiên âm
                                </h3>
                                {transcription && (
                                    <button 
                                        onClick={() => navigator.clipboard.writeText(transcription)}
                                        className="p-1.5 text-slate-400 hover:text-white hover:bg-slate-700 rounded-lg transition-colors"
                                        title="Sao chép văn bản"
                                    >
                                        <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                                        </svg>
                                    </button>
                                )}
                            </div>
                            
                            <div className="flex-1 bg-slate-900/50 rounded-xl border border-slate-700/50 overflow-y-auto custom-scrollbar p-4">
                                {transcription ? (
                                    <p className="text-slate-200 leading-relaxed whitespace-pre-wrap text-sm md:text-base">{transcription}</p>
                                ) : (
                                    <div className="h-full flex flex-col items-center justify-center text-slate-600">
                                        <p className="text-sm">Chưa có bản phiên âm nào</p>
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* Analysis Result */}
                        {(analysis || isAnalyzing) && (
                            <div className="flex-1 bg-gradient-to-br from-slate-800/50 to-purple-900/10 rounded-2xl border border-slate-700 p-5 flex flex-col animate-fade-in h-1/2">
                                <div className="flex items-center justify-between mb-3 flex-shrink-0">
                                    <h3 className="text-xs font-bold text-purple-400 uppercase tracking-wider flex items-center gap-2">
                                        <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                                            <path fillRule="evenodd" d="M5 2a1 1 0 011 1v1h1a1 1 0 010 2H6v1a1 1 0 01-2 0V6H3a1 1 0 010-2h1V3a1 1 0 011-1zm0 5a1 1 0 011 1v1h1a1 1 0 110 2H6v1a1 1 0 11-2 0v-1H3a1 1 0 110-2h1V8a1 1 0 011-1zm5-5a1 1 0 11-2 0 1 1 0 012 0zm5 0a1 1 0 11-2 0 1 1 0 012 0z" clipRule="evenodd" />
                                        </svg>
                                        Phân tích AI
                                    </h3>
                                    {analysis && (
                                        <button 
                                            onClick={() => navigator.clipboard.writeText(analysis)}
                                            className="p-1.5 text-slate-400 hover:text-purple-300 hover:bg-purple-900/30 rounded-lg transition-colors"
                                            title="Sao chép phân tích"
                                        >
                                            <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                                            </svg>
                                        </button>
                                    )}
                                </div>
                                
                                <div className="flex-1 bg-slate-900/80 rounded-xl border border-slate-700/50 overflow-y-auto custom-scrollbar p-4 shadow-inner">
                                    {isAnalyzing && !analysis ? (
                                        <div className="flex items-center justify-center h-full gap-3">
                                            <svg className="animate-spin h-5 w-5 text-purple-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                                <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                                                <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                            </svg>
                                            <span className="text-sm text-purple-300 animate-pulse">Đang phân tích với Lời nhắc Hệ thống...</span>
                                        </div>
                                    ) : (
                                        <div className="markdown-body text-slate-200 text-sm md:text-base leading-relaxed">
                                            {analysis.split('\n').map((line, i) => (
                                                <p key={i} className="mb-2">{line}</p>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            </div>
        );
      };

      const App = () => {
        return (
            <div className="flex flex-col h-screen w-full bg-slate-950 overflow-hidden">
                <header className="flex items-center gap-3 px-6 py-4 bg-slate-900/80 border-b border-slate-800 backdrop-blur-md sticky top-0 z-50">
                    <div className="h-8 w-8 bg-gradient-to-br from-blue-500 to-purple-600 rounded-lg flex items-center justify-center shadow-lg shadow-blue-500/20">
                        <svg className="w-5 h-5 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                        </svg>
                    </div>
                    <h1 className="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-white to-slate-400">Gemini Phiên Âm</h1>
                </header>
                
                <main className="flex-1 relative overflow-hidden">
                    <div className="absolute top-0 left-1/4 w-96 h-96 bg-blue-600/10 rounded-full blur-3xl -translate-y-1/2 pointer-events-none"></div>
                    <div className="absolute bottom-0 right-1/4 w-96 h-96 bg-purple-600/10 rounded-full blur-3xl translate-y-1/2 pointer-events-none"></div>

                    <div className="relative h-full w-full flex flex-col">
                        <AudioTranscriber />
                    </div>
                </main>
            </div>
        );
      };

      // ==========================================
      // INIT
      // ==========================================
      
      const rootElement = document.getElementById('root');
      if (rootElement) {
        const root = createRoot(rootElement);
        root.render(
            <React.StrictMode>
                <App />
            </React.StrictMode>
        );
      }
    </script>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
